name: Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Checkout
      uses: actions/checkout@v6

    # ::: Docker Setup :::
    - uses: docker/setup-qemu-action@v3
    - uses: docker/setup-buildx-action@v3

    - name: "🗝️ Docker Login: GitHub Container Registry"
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: "🗝️ Docker Login: DockerHub"
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 🏷️ Get additional tags
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          lachee/act-cache
          ghcr.io/lachee/act-cache
        flavor: |
          latest=true
        tags: |
          type=raw,value=${{ github.ref_name}},priority=500,prefix=branch-
        labels: |
          org.opencontainers.image.title=Act Cache
          org.opencontainers.image.description=Gitea external cache server 
          org.opencontainers.image.vendor=Lachee
          org.opencontainers.image.source=${{ github.repository }}
          org.opencontainers.image.revision=${{ env.COMMIT_ID }}
      env:
        DOCKER_METADATA_ANNOTATIONS_LEVELS: manifest,index

    - name: 🐳 Build docker image
      uses: docker/build-push-action@v5
      with:
        context: moodle
        platforms: linux/amd64,linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        annotations: ${{ steps.meta.outputs.annotations }}
        push: true
        cache-from: type=gha
        cache-to: type=gha,mode=max